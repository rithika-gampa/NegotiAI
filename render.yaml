databases:
  - name: negotiai-db
    plan: free

services:
  - type: web
    name: negotiai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: negotiai-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PRIMARY_PROVIDER
        value: anthropic
      - key: BACKUP_PROVIDERS
        value: groq,gemini
      - key: SESSION_SECRET
        generateValue: true
